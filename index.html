<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ارسال موقعیت</title>

<!-- EmailJS library -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<!-- PWA manifest -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body{
    font-family:tahoma;
    background:#f5f5f5;
    padding:30px;
    text-align:center;
}
.card{
    max-width:400px;
    margin:auto;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
}
button{
    width:100%;
    border:none;
    border-radius:12px;
    padding:18px;
    font-size:18px;
    cursor:pointer;
}
.status{
    margin-top:20px;
    font-size:15px;
}
.ok{ color:green; }
.err{ color:red; }
</style>

</head>
<body>

<div class="card">
<h2>اشتراک موقعیت</h2>
<p>با فشردن دکمه زیر، موقعیت فعلی شما برای مدیر ارسال می‌شود.</p>

<button onclick="shareLocation()">ارسال موقعیت</button>
<div class="status" id="status">آماده ارسال</div>
</div>

<script>
emailjs.init("eS7d6-exAWgeg8udU"); // جایگزین با Public Key خودت

const statusBox = document.getElementById("status");

function setStatus(text, cls=""){
    statusBox.className = "status " + cls;
    statusBox.innerText = text;
}

async function send(lat, lon, accuracy){
    const templateParams = {
        lat,
        lon,
        accuracy,
        nshn: `https://nshn.ir/?lat=${lat}&lng=${lon}`,
        balad: `https://balad.ir/p/${lat},${lon}`
    };
    await emailjs.send(
        "service_6gxhqdn",    // جایگزین با Service ID خودت
        "template_slp067m",   // جایگزین با Template ID خودت
        templateParams
    );
}

async function shareLocation(){
    setStatus("درحال دریافت موقعیت...");
    navigator.geolocation.getCurrentPosition(
        async pos => {
            try{
                await send(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
                setStatus("موقعیت با موفقیت ارسال شد", "ok");
            }catch(e){
                setStatus("خطا در ارسال", "err");
            }
        },
        err => {
            setStatus("دسترسی موقعیت رد شد", "err");
        },
        { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
    );
}

// ثبت Service Worker ساده برای PWA
if("serviceWorker" in navigator){
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
